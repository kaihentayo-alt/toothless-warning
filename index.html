<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warning</title>

<style>
body {
    margin: 0;
    background: #000;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 20px;
}

h1 {
    font-size: 3rem;
}

p {
    font-size: 1.2rem;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 1.2rem;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>⚠️ WARNING ⚠️</h1>
    <p>This content may be disturbing.</p>
    <p>Proceed at your own risk.</p>

    <button onclick="goToMeme()">Continue</button>
</div>

<script>
function goToMeme() {
    window.location.href = "https://www.youtube.com/watch?v=4xnsmyI5KMQ";
}
</script>

</body>
</html>
